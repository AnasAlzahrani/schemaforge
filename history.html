<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consultation History — SchemaForge</title>
<meta name="description" content="Review your past study design consultations. All data stays in your browser.">
<link rel="canonical" href="https://schemaforge-seven.vercel.app/history">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--surface:#111827;--surface2:#1a2332;--border:#1e2d3d;--text:#e2e8f0;--dim:#64748b;--accent:#06b6d4;--accent2:#0e7490;--green:#10b981;--red:#ef4444;--font:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif}
body{background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
a{color:var(--accent);text-decoration:none}
.container{max-width:900px;margin:0 auto;padding:0 1.5rem;width:100%}
nav{border-bottom:1px solid var(--border);padding:1rem 0}
nav .container{display:flex;justify-content:space-between;align-items:center}
.brand{font-weight:700;font-size:1.1rem;color:var(--text)}
.brand span{color:var(--accent)}
nav a.back{color:var(--dim);font-size:.9rem}
.hero{padding:2.5rem 0 1.5rem;text-align:center}
.hero h1{font-size:1.6rem;margin-bottom:.4rem}
.hero p{color:var(--dim);font-size:.95rem}
.main{flex:1;padding:0 0 3rem}
.empty{text-align:center;padding:4rem 2rem;color:var(--dim)}
.empty p{margin:.5rem 0}
.empty .icon{font-size:2.5rem;margin-bottom:1rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1rem;cursor:pointer;transition:border-color .2s}
.card:hover{border-color:var(--accent2)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem}
.card-aim{font-size:.95rem;font-weight:500;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;gap:.75rem;margin-top:.5rem;font-size:.8rem;color:var(--dim)}
.card-tag{display:inline-block;background:rgba(6,182,212,.1);border:1px solid var(--accent2);border-radius:4px;padding:1px 8px;font-size:.75rem;color:var(--accent);white-space:nowrap}
.card-date{white-space:nowrap}
.card-actions{display:flex;gap:.5rem;margin-top:.75rem}
.card-actions button{background:var(--surface2);border:1px solid var(--border);color:var(--dim);padding:.35rem .75rem;border-radius:6px;font-size:.8rem;cursor:pointer;transition:all .2s;font-family:var(--font)}
.card-actions button:hover{border-color:var(--accent);color:var(--accent)}
.card-actions button.danger:hover{border-color:var(--red);color:var(--red)}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.toolbar .count{font-size:.9rem;color:var(--dim)}
.toolbar button{background:transparent;border:1px solid var(--border);color:var(--dim);padding:.4rem .8rem;border-radius:6px;font-size:.85rem;cursor:pointer;transition:all .2s;font-family:var(--font)}
.toolbar button:hover{border-color:var(--red);color:var(--red)}
/* Expanded view */
.card-expanded{display:none;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);font-size:.9rem;line-height:1.7;max-height:500px;overflow-y:auto}
.card-expanded h2{color:var(--accent);font-size:1rem;margin:1.25rem 0 .4rem;padding-bottom:.2rem;border-bottom:1px solid var(--border)}
.card-expanded h2:first-child{margin-top:0}
.card-expanded h3{color:var(--accent);font-size:.9rem;margin:.75rem 0 .3rem}
.card-expanded ul{margin:.4rem 0;padding-left:1.25rem}
.card-expanded li{margin:.2rem 0}
.card-expanded strong{color:var(--text)}
.card-expanded code{background:rgba(6,182,212,.1);padding:1px 5px;border-radius:3px;font-size:.88em}
.card-expanded p{margin:.4rem 0}
.md-table{width:100%;border-collapse:collapse;margin:.5rem 0;font-size:.85rem}
.md-table th,.md-table td{border:1px solid var(--border);padding:.4rem .6rem;text-align:left}
.md-table th{background:var(--surface2);color:var(--accent);font-weight:600;font-size:.8rem}
.md-table tr:nth-child(even) td{background:rgba(255,255,255,.02)}
blockquote{border-left:3px solid var(--accent2);padding:.4rem .8rem;margin:.4rem 0;color:var(--dim);background:rgba(6,182,212,.03);border-radius:0 6px 6px 0}
footer{border-top:1px solid var(--border);padding:1.5rem 0;text-align:center;color:var(--dim);font-size:.85rem}
.privacy{text-align:center;padding:.75rem;font-size:.8rem;color:var(--dim);background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:1.5rem}
@media(max-width:600px){.hero h1{font-size:1.3rem}.card{padding:1rem}.toolbar{flex-direction:column;gap:.5rem;align-items:flex-start}}
</style>
</head>
<body>
<nav><div class="container"><div class="brand">Schema<span>Forge</span></div><a href="/" class="back">← Home</a></div></nav>

<div class="container">
<div class="hero">
<h1>📋 Consultation History</h1>
<p>Your past study design consultations, stored locally in your browser.</p>
</div>

<div class="main">
<div class="privacy">🔒 All data stays on your device — nothing is sent to our servers.</div>
<div id="content"></div>
</div>
</div>

<footer>
<div class="container">SchemaForge by <a href="https://coef.health">Coefficients</a> · <a href="/consult">New consultation →</a></div>
</footer>

<script>
function renderMarkdown(md) {
  md = md.replace(/(?:^|\n)((?:\|.+\|\n)+)/g, (match, tableBlock) => {
    const rows = tableBlock.trim().split('\n').filter(r => r.trim());
    if (rows.length < 2) return match;
    const isSep = r => /^\|[\s\-:]+\|$/.test(r.trim());
    let html = '<table class="md-table">';
    let startBody = 1;
    if (rows.length >= 2 && isSep(rows[1])) {
      const cells = rows[0].split('|').filter(c => c.trim() !== '');
      html += '<thead><tr>' + cells.map(c => `<th>${c.trim()}</th>`).join('') + '</tr></thead>';
      startBody = 2;
    }
    html += '<tbody>';
    for (let i = startBody; i < rows.length; i++) {
      if (isSep(rows[i])) continue;
      const cells = rows[i].split('|').filter(c => c.trim() !== '');
      html += '<tr>' + cells.map(c => `<td>${c.trim()}</td>`).join('') + '</tr>';
    }
    html += '</tbody></table>';
    return '\n' + html + '\n';
  });
  md = md.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  md = md.replace(/<\/blockquote>\n<blockquote>/g, '<br>');
  return md
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) +
    ' · ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
}

function typeLabel(t) {
  const map = { rct: 'RCT', cohort: 'Cohort', 'case-control': 'Case-Control', claims: 'Claims/EHR', registry: 'Registry', unsure: 'Unspecified' };
  return map[t] || t || 'Unspecified';
}

function exportOne(item) {
  let md = '# SchemaForge Study Design Consultation\n';
  md += `_Generated ${formatDate(item.date)}_\n\n`;
  md += `**Research Aim:** ${item.aim}\n`;
  if (item.type && item.type !== 'unsure') md += `**Study Type:** ${typeLabel(item.type)}\n`;
  if (item.context) md += `**Context:** ${item.context}\n`;
  md += '\n---\n\n' + item.result + '\n\n---\n_Consultation by [SchemaForge](https://schemaforge-seven.vercel.app) · Coefficients_\n';
  
  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `schemaforge-${new Date(item.date).toISOString().slice(0,10)}.md`;
  a.click();
  URL.revokeObjectURL(url);
}

function deleteOne(idx) {
  if (!confirm('Delete this consultation? This cannot be undone.')) return;
  const history = JSON.parse(localStorage.getItem('sf_history') || '[]');
  history.splice(idx, 1);
  localStorage.setItem('sf_history', JSON.stringify(history));
  render();
}

function clearAll() {
  if (!confirm('Delete ALL consultation history? This cannot be undone.')) return;
  localStorage.removeItem('sf_history');
  render();
}

function toggleExpand(idx) {
  const el = document.getElementById('expanded-' + idx);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

function render() {
  const container = document.getElementById('content');
  const history = JSON.parse(localStorage.getItem('sf_history') || '[]');
  
  if (!history.length) {
    container.innerHTML = `
      <div class="empty">
        <div class="icon">📝</div>
        <p>No consultations yet.</p>
        <p><a href="/consult">Start your first consultation →</a></p>
      </div>`;
    return;
  }
  
  let html = `<div class="toolbar">
    <span class="count">${history.length} consultation${history.length > 1 ? 's' : ''}</span>
    <button onclick="clearAll()">🗑 Clear All</button>
  </div>`;
  
  for (let i = 0; i < history.length; i++) {
    const item = history[i];
    const preview = item.aim.length > 150 ? item.aim.slice(0, 150) + '…' : item.aim;
    html += `
      <div class="card" onclick="toggleExpand(${i})">
        <div class="card-header">
          <div class="card-aim">${preview}</div>
        </div>
        <div class="card-meta">
          <span class="card-date">${formatDate(item.date)}</span>
          <span class="card-tag">${typeLabel(item.type)}</span>
        </div>
        <div class="card-actions">
          <button onclick="event.stopPropagation();exportOne(${i})">📄 Export</button>
          <button class="danger" onclick="event.stopPropagation();deleteOne(${i})">🗑 Delete</button>
        </div>
        <div class="card-expanded" id="expanded-${i}">${renderMarkdown(item.result || '')}</div>
      </div>`;
  }
  
  container.innerHTML = html;
}

// Fix export serialization
function exportOne(item) {
  if (typeof item === 'number') {
    const history = JSON.parse(localStorage.getItem('sf_history') || '[]');
    item = history[item];
  }
  let md = '# SchemaForge Study Design Consultation\n';
  md += `_Generated ${formatDate(item.date)}_\n\n`;
  md += `**Research Aim:** ${item.aim}\n`;
  if (item.type && item.type !== 'unsure') md += `**Study Type:** ${typeLabel(item.type)}\n`;
  if (item.context) md += `**Context:** ${item.context}\n`;
  md += '\n---\n\n' + item.result + '\n\n---\n_Consultation by [SchemaForge](https://schemaforge-seven.vercel.app) · Coefficients_\n';
  
  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `schemaforge-${new Date(item.date).toISOString().slice(0,10)}.md`;
  a.click();
  URL.revokeObjectURL(url);
}

render();
</script>
</body>
</html>
